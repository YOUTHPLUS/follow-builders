<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Follow Builders Not Influencers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: #000000;
            color: #f5f5f7;
            line-height: 1.5;
            padding: 0;
        }

        .hero-section {
            background: linear-gradient(180deg, #000000 0%, #1a1a1a 100%);
            padding: 120px 20px 80px;
            text-align: center;
        }

        .hero-title {
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.015em;
            line-height: 1.1;
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 50%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 24px;
            color: #86868b;
            font-weight: 400;
            max-width: 700px;
            margin: 0 auto;
        }

        .language-toggle {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(255,255,255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #f5f5f7;
            transition: all 0.3s ease;
        }

        .language-toggle:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .date-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin-bottom: 60px;
        }

        .date-btn {
            background: none;
            border: none;
            color: #f5f5f7;
            font-size: 28px;
            font-weight: 300;
            cursor: pointer;
            padding: 8px 16px;
            transition: all 0.2s ease;
            line-height: 1;
        }

        .date-btn:hover {
            color: #00c6ff;
        }

        .date-btn:active {
            color: #0072ff;
        }

        .date-input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 500;
            color: #f5f5f7;
            min-width: 160px;
            cursor: pointer;
        }

        .date-input:focus {
            outline: none;
            border-color: #00c6ff;
            background: rgba(255, 255, 255, 0.12);
        }

        .date-input::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        .section {
            margin-bottom: 80px;
        }

        .section-header {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 40px;
            font-weight: 700;
            color: #f5f5f7;
            letter-spacing: -0.003em;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 32px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 32px;
            transition: all 0.3s ease;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 32px rgba(0, 198, 255, 0.15);
            transform: translateY(-4px);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 50%, #a855f7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
            margin-right: 16px;
        }

        .card-title {
            font-size: 17px;
            font-weight: 600;
            color: #f5f5f7;
        }

        .card-time {
            font-size: 13px;
            color: #86868b;
            margin-top: 2px;
        }

        .card-content {
            font-size: 15px;
            color: #d1d1d6;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .card-type {
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 500;
            display: inline-block;
            margin-top: 16px;
            letter-spacing: 0.02em;
        }

        .card-type.twitter {
            background: rgba(29, 161, 242, 0.15);
            color: #1da1f2;
        }

        .card-type.blog {
            background: rgba(52, 211, 153, 0.15);
            color: #34d399;
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
            color: #86868b;
            font-size: 17px;
        }

        .error {
            text-align: center;
            padding: 80px 20px;
            color: #ff453a;
            font-size: 17px;
        }

        .no-data {
            text-align: center;
            padding: 120px 20px;
            color: #86868b;
            font-size: 19px;
        }

        .footer {
            text-align: center;
            padding: 60px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: #86868b;
            font-size: 14px;
            background: #000000;
        }

        .footer-content {
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.8;
        }

        .footer a {
            color: #00c6ff;
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
            color: #0072ff;
        }

        .footer .repo-info {
            margin-top: 12px;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 40px;
            }

            .hero-subtitle {
                font-size: 18px;
            }

            .hero-section {
                padding: 80px 20px 60px;
            }

            .container {
                padding: 20px;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }

            .date-controls {
                padding: 20px;
            }

            .date-input {
                min-width: 140px;
                font-size: 15px;
            }

            .section-title {
                font-size: 32px;
            }

            .card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <button class="language-toggle" onclick="switchLanguage()">中文</button>

    <div class="hero-section">
        <h1 class="hero-title" id="mainTitle">Follow Builders<br>Not Influencers</h1>
        <p class="hero-subtitle" id="subtitle">Track AI builders' latest content and insights</p>
    </div>

    <div class="container">
        <div class="date-controls">
            <button class="date-btn" onclick="changeDate(-1)" id="prevDay">←</button>
            <input type="date" class="date-input" id="datePicker" onchange="handleDateChange()">
            <button class="date-btn" onclick="changeDate(1)" id="nextDay">→</button>
        </div>

        <div id="content">
            <div class="loading" id="loading">Loading...</div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-content">
            <div>Source: <a href="https://github.com/zarazhangrui/follow-builders" target="_blank">zarazhangrui/follow-builders</a></div>
            <div class="repo-info">GitHub Repository - Data updated automatically</div>
        </div>
    </div>

    <script>
        // State management
        let selectedDate = new Date();
        let currentLang = 'en';
        let twitterData = [];
        let blogData = [];

        // Language texts
        const translations = {
            en: {
                mainTitle: 'Follow Builders<br>Not Influencers',
                subtitle: "Track AI builders' latest content and insights",
                twitterSection: 'Twitter',
                blogSection: 'Blogs',
                loading: 'Loading...',
                error: 'Failed to load data. Please try again.',
                noData: 'No content found for this date.',
                langBtn: '中文'
            },
            zh: {
                mainTitle: '关注构建者<br>而非网红',
                subtitle: '追踪AI构建者的最新内容和见解',
                twitterSection: 'Twitter',
                blogSection: '博客',
                loading: '加载中...',
                error: '加载数据失败，请重试。',
                noData: '该日期没有找到内容。',
                langBtn: 'English'
            }
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Load saved language preference
            const savedLang = localStorage.getItem('language') || 'en';
            currentLang = savedLang;
            updateLanguageUI();

            // Set initial date to today
            const today = new Date();
            selectedDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            document.getElementById('datePicker').value = formatDate(selectedDate);

            // Load data
            loadData();
        });

        // Language switching
        function switchLanguage() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            localStorage.setItem('language', currentLang);
            updateLanguageUI();
            renderContent();
        }

        function updateLanguageUI() {
            const t = translations[currentLang];
            document.getElementById('mainTitle').innerHTML = t.mainTitle;
            document.getElementById('subtitle').textContent = t.subtitle;
            document.querySelector('.language-toggle').textContent = t.langBtn;
        }

        // Date handling
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function changeDate(delta) {
            selectedDate.setDate(selectedDate.getDate() + delta);
            document.getElementById('datePicker').value = formatDate(selectedDate);
            loadData();
        }

        function handleDateChange() {
            const inputDate = document.getElementById('datePicker').value;
            if (inputDate) {
                selectedDate = new Date(inputDate);
                loadData();
            }
        }

        // Data loading
        async function loadData() {
            const contentDiv = document.getElementById('content');
            const t = translations[currentLang];

            contentDiv.innerHTML = `<div class="loading">${t.loading}</div>`;

            const dateStr = formatDate(selectedDate);

            try {
                // Load Twitter data
                const twitterResponse = await fetch(`./feed-x.json`);
                let twitterRaw = twitterResponse.ok ? await twitterResponse.json() : null;

                // Parse Twitter data - handle different formats
                if (twitterRaw && twitterRaw.x) {
                    twitterData = [];
                    twitterRaw.x.forEach(builder => {
                        builder.tweets.forEach(tweet => {
                            twitterData.push({
                                author: builder.name,
                                content: tweet.text,
                                date: tweet.createdAt,
                                url: tweet.url
                            });
                        });
                    });
                } else if (twitterRaw && Array.isArray(twitterRaw)) {
                    twitterData = twitterRaw;
                } else {
                    twitterData = [];
                }

                // Load blog data
                const blogResponse = await fetch(`./feed-blogs.json`);
                let blogRaw = blogResponse.ok ? await blogResponse.json() : null;

                if (blogRaw && typeof blogRaw === 'string') {
                    try {
                        blogRaw = JSON.parse(blogRaw);
                    } catch (e) {
                        blogRaw = null;
                    }
                }

                if (blogRaw && blogRaw.pdf_content) {
                    try {
                        const parsed = JSON.parse(blogRaw.pdf_content);
                        if (parsed.blogs) {
                            blogData = parsed.blogs;
                        } else {
                            blogData = [];
                        }
                    } catch (e) {
                        blogData = [];
                    }
                } else if (blogRaw && blogRaw.blogs) {
                    blogData = blogRaw.blogs;
                } else if (blogRaw && Array.isArray(blogRaw)) {
                    blogData = blogRaw;
                } else {
                    blogData = [];
                }

                renderContent();
            } catch (error) {
                console.error('Error loading data:', error);
                contentDiv.innerHTML = `<div class="error">${t.error}</div>`;
            }
        }

        function filterDataByDate(data) {
            if (!Array.isArray(data)) return [];

            const dateStr = formatDate(selectedDate);
            return data.filter(item => {
                const itemDate = new Date(item.date);
                return formatDate(itemDate) === dateStr;
            });
        }

        function translateContent(text, targetLang) {
            if (targetLang === 'en' || !text) return text;

            // Simple translation for common terms
            const translations = {
                'AI': 'AI',
                'OpenClaw': 'OpenClaw',
                'GPT': 'GPT',
                'Claude': 'Claude',
                'Twitter': 'Twitter',
                'GitHub': 'GitHub',
                'Vercel': 'Vercel',
                'Next.js': 'Next.js',
                'Product at Roblox': 'Roblox产品经理',
                'CEO @box': 'Box首席执行官',
                'President & CEO @ycombinator': 'Y Combinator总裁兼CEO',
                'head of product @linear': 'Linear产品负责人',
                'VC at @FirstMarkCap': 'FirstMark Capital风险投资人',
                'Builder. Dangerously skips permissions.': '构建者。危险地跳过权限检查。',
                'Harvard\'17': '哈佛2017届',
                'achieve ambition with intentionality, intensity, integrity & insanity.': '以意图、强度、正直和疯狂实现野心。',
                'Practical AI tutorials and interviews for busy people': '为忙碌的人提供实用的AI教程和访谈',
                'your business lives in content. unleash it with AI': '你的业务在于内容。用AI释放它',
                'investing in seed/A. previous: early hire @meter, @opendoor, @atlassian & others.': '投资种子轮/A轮。此前：@meter、@opendoor、@atlassian等早期员工。'
            };

            // Try to replace known terms
            let translatedText = text;
            Object.keys(translations).forEach(key => {
                translatedText = translatedText.replace(new RegExp(key, 'g'), translations[key]);
            });

            return translatedText;
        }

        function renderContent() {
            const contentDiv = document.getElementById('content');
            const t = translations[currentLang];

            const filteredTwitter = filterDataByDate(twitterData);
            const filteredBlogs = filterDataByDate(blogData);

            if (filteredTwitter.length === 0 && filteredBlogs.length === 0) {
                contentDiv.innerHTML = `<div class="no-data">${t.noData}</div>`;
                return;
            }

            let html = '';

            // Render Twitter section
            if (filteredTwitter.length > 0) {
                html += `<div class="section">
                    <div class="section-header">
                        <h2 class="section-title">${t.twitterSection}</h2>
                    </div>
                    <div class="card-grid">`;
                filteredTwitter.forEach(tweet => {
                    html += renderCard(tweet, 'twitter');
                });
                html += `</div></div>`;
            }

            // Render Blogs section
            if (filteredBlogs.length > 0) {
                html += `<div class="section">
                    <div class="section-header">
                        <h2 class="section-title">${t.blogSection}</h2>
                    </div>
                    <div class="card-grid">`;
                filteredBlogs.forEach(blog => {
                    html += renderCard(blog, 'blog');
                });
                html += `</div></div>`;
            }

            contentDiv.innerHTML = html;
        }

        function renderCard(item, type) {
            const t = translations[currentLang];
            const authorInitial = item.author ? item.author.charAt(0).toUpperCase() : 'U';
            const content = translateContent(item.content || item.text || '', currentLang);

            return `
                <div class="card">
                    <div class="card-header">
                        <div class="card-avatar">${authorInitial}</div>
                        <div>
                            <div class="card-title">${translateContent(item.author || 'Unknown', currentLang)}</div>
                            <div class="card-time">${formatDateTime(item.date)}</div>
                        </div>
                    </div>
                    <div class="card-content">${content}</div>
                    <span class="card-type ${type}">${type.toUpperCase()}</span>
                </div>
            `;
        }

        function formatDateTime(dateStr) {
            const date = new Date(dateStr);

            if (currentLang === 'zh') {
                return date.toLocaleString('zh-CN', {
                    month: 'long',
                    day: 'numeric',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } else {
                return date.toLocaleString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }
        }
    </script>
</body>
</html>
