<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Builders Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .header {
            padding: 40px;
            text-align: center;
            background: linear-gradient(180deg, #ffffff 0%, #f5f5f7 100%);
            border-bottom: 1px solid #e5e5e5;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 17px;
            color: #6e6e73;
        }

        .language-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #f5f5f7;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #1d1d1f;
            transition: all 0.3s ease;
        }

        .language-toggle:hover {
            background: #e5e5e5;
        }

        .date-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 20px;
            background: #f5f5f7;
            border-bottom: 1px solid #e5e5e5;
        }

        .date-btn {
            background: none;
            border: none;
            color: #0066cc;
            font-size: 14px;
            cursor: pointer;
            padding: 4px 8px;
            transition: all 0.2s ease;
        }

        .date-btn:hover {
            text-decoration: underline;
        }

        .date-btn:active {
            color: #004499;
        }

        .date-input {
            background: white;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 14px;
            color: #1d1d1f;
            min-width: 140px;
            cursor: pointer;
        }

        .date-input:focus {
            outline: none;
            border-color: #0066cc;
        }

        .content {
            padding: 20px 40px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 16px;
            letter-spacing: -0.2px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .card-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
            margin-right: 12px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1d1d1f;
        }

        .card-time {
            font-size: 12px;
            color: #6e6e73;
            margin-top: 2px;
        }

        .card-content {
            font-size: 14px;
            color: #1d1d1f;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .card-type {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 500;
            display: inline-block;
            margin-top: 12px;
        }

        .card-type.twitter {
            background: rgba(29, 161, 242, 0.1);
            color: #1da1f2;
        }

        .card-type.blog {
            background: rgba(52, 211, 153, 0.1);
            color: #34d399;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6e6e73;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #ff3b30;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #6e6e73;
        }

        .footer {
            text-align: center;
            padding: 30px;
            border-top: 1px solid #e5e5e5;
            color: #6e6e73;
            font-size: 13px;
        }

        .footer a {
            color: #0066cc;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
            }

            .header p {
                font-size: 15px;
            }

            .header {
                padding: 30px 20px;
            }

            .content {
                padding: 20px;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }

            .date-controls {
                padding: 16px;
            }

            .date-input {
                min-width: 120px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="language-toggle" onclick="switchLanguage()">English</button>

        <div class="header">
            <h1 id="mainTitle">AI Builders Tracker</h1>
            <p id="subtitle">Track AI builders' latest content and insights</p>
        </div>

        <div class="date-controls">
            <button class="date-btn" onclick="changeDate(-1)" id="prevDay">Previous Day</button>
            <input type="date" class="date-input" id="datePicker" onchange="handleDateChange()">
            <button class="date-btn" onclick="changeDate(1)" id="nextDay">Next Day</button>
        </div>

        <div class="content" id="content">
            <div class="loading" id="loading">Loading...</div>
        </div>

        <div class="footer">
            <a href="https://github.com/zarazhangrui/follow-builders" target="_blank">Source</a>
        </div>
    </div>

    <script>
        // State management
        let selectedDate = new Date();
        let currentLang = 'en';
        let twitterData = [];
        let blogData = [];

        // Language texts
        const translations = {
            en: {
                mainTitle: 'AI Builders Tracker',
                subtitle: "Track AI builders' latest content and insights",
                prevDay: 'Previous Day',
                nextDay: 'Next Day',
                twitterSection: 'Twitter',
                blogSection: 'Blogs',
                loading: 'Loading...',
                error: 'Failed to load data. Please try again.',
                noData: 'No content found for this date.',
                langBtn: '中文'
            },
            zh: {
                mainTitle: 'AI构建者追踪',
                subtitle: '追踪AI构建者的最新内容和见解',
                prevDay: '前一天',
                nextDay: '后一天',
                twitterSection: 'Twitter',
                blogSection: '博客',
                loading: '加载中...',
                error: '加载数据失败，请重试。',
                noData: '该日期没有找到内容。',
                langBtn: 'English'
            }
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Load saved language preference
            const savedLang = localStorage.getItem('language') || 'en';
            currentLang = savedLang;
            updateLanguageUI();

            // Set initial date to today
            const today = new Date();
            selectedDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            document.getElementById('datePicker').value = formatDate(selectedDate);

            // Load data
            loadData();
        });

        // Language switching
        function switchLanguage() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            localStorage.setItem('language', currentLang);
            updateLanguageUI();
            renderContent();
        }

        function updateLanguageUI() {
            const t = translations[currentLang];
            document.getElementById('mainTitle').textContent = t.mainTitle;
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('prevDay').textContent = t.prevDay;
            document.getElementById('nextDay').textContent = t.nextDay;
            document.querySelector('.language-toggle').textContent = t.langBtn;
        }

        // Date handling
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function changeDate(delta) {
            selectedDate.setDate(selectedDate.getDate() + delta);
            document.getElementById('datePicker').value = formatDate(selectedDate);
            loadData();
        }

        function handleDateChange() {
            const inputDate = document.getElementById('datePicker').value;
            if (inputDate) {
                selectedDate = new Date(inputDate);
                loadData();
            }
        }

        // Data loading
        async function loadData() {
            const contentDiv = document.getElementById('content');
            const t = translations[currentLang];

            contentDiv.innerHTML = `<div class="loading">${t.loading}</div>`;

            const dateStr = formatDate(selectedDate);

            try {
                // Load Twitter data
                const twitterResponse = await fetch(`./feed-x.json`);
                let twitterRaw = twitterResponse.ok ? await twitterResponse.json() : null;

                // Parse Twitter data - handle different formats
                if (twitterRaw && twitterRaw.x) {
                    // Format: { x: [ { name, tweets: [...] } ] }
                    twitterData = [];
                    twitterRaw.x.forEach(builder => {
                        builder.tweets.forEach(tweet => {
                            twitterData.push({
                                author: builder.name,
                                content: tweet.text,
                                date: tweet.createdAt,
                                url: tweet.url
                            });
                        });
                    });
                } else if (twitterRaw && Array.isArray(twitterRaw)) {
                    // Format: [ { author, content, date } ]
                    twitterData = twitterRaw;
                } else {
                    twitterData = [];
                }

                // Load blog data
                const blogResponse = await fetch(`./feed-blogs.json`);
                let blogRaw = blogResponse.ok ? await blogResponse.json() : null;

                // Parse blog data - handle different formats
                if (blogRaw && typeof blogRaw === 'string') {
                    // Might be wrapped in pdf_content
                    try {
                        blogRaw = JSON.parse(blogRaw);
                    } catch (e) {
                        blogRaw = null;
                    }
                }

                if (blogRaw && blogRaw.pdf_content) {
                    // Format: { pdf_content: "..." }
                    try {
                        const parsed = JSON.parse(blogRaw.pdf_content);
                        if (parsed.blogs) {
                            // Format: { pdf_content: { blogs: [...] } }
                            blogData = parsed.blogs;
                        } else {
                            blogData = [];
                        }
                    } catch (e) {
                        blogData = [];
                    }
                } else if (blogRaw && blogRaw.blogs) {
                    // Format: { blogs: [...] }
                    blogData = blogRaw.blogs;
                } else if (blogRaw && Array.isArray(blogRaw)) {
                    // Format: [ { author, content, date } ]
                    blogData = blogRaw;
                } else {
                    blogData = [];
                }

                renderContent();
            } catch (error) {
                console.error('Error loading data:', error);
                contentDiv.innerHTML = `<div class="error">${t.error}</div>`;
            }
        }

        function filterDataByDate(data) {
            if (!Array.isArray(data)) return [];

            const dateStr = formatDate(selectedDate);
            return data.filter(item => {
                const itemDate = new Date(item.date);
                return formatDate(itemDate) === dateStr;
            });
        }

        function renderContent() {
            const contentDiv = document.getElementById('content');
            const t = translations[currentLang];

            const filteredTwitter = filterDataByDate(twitterData);
            const filteredBlogs = filterDataByDate(blogData);

            if (filteredTwitter.length === 0 && filteredBlogs.length === 0) {
                contentDiv.innerHTML = `<div class="no-data">${t.noData}</div>`;
                return;
            }

            let html = '';

            // Render Twitter section
            if (filteredTwitter.length > 0) {
                html += `<div class="section">
                    <h2 class="section-title">${t.twitterSection}</h2>
                    <div class="card-grid">`;
                filteredTwitter.forEach(tweet => {
                    html += renderCard(tweet, 'twitter');
                });
                html += `</div></div>`;
            }

            // Render Blogs section
            if (filteredBlogs.length > 0) {
                html += `<div class="section">
                    <h2 class="section-title">${t.blogSection}</h2>
                    <div class="card-grid">`;
                filteredBlogs.forEach(blog => {
                    html += renderCard(blog, 'blog');
                });
                html += `</div></div>`;
            }

            contentDiv.innerHTML = html;
        }

        function renderCard(item, type) {
            const t = translations[currentLang];
            const authorInitial = item.author ? item.author.charAt(0).toUpperCase() : 'U';
            const content = item.content || item.text || '';

            return `
                <div class="card">
                    <div class="card-header">
                        <div class="card-avatar">${authorInitial}</div>
                        <div>
                            <div class="card-title">${item.author || 'Unknown'}</div>
                            <div class="card-time">${formatDateTime(item.date)}</div>
                        </div>
                    </div>
                    <div class="card-content">${content}</div>
                    <span class="card-type ${type}">${type.toUpperCase()}</span>
                </div>
            `;
        }

        function formatDateTime(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
</body>
</html>
