<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Follow builders, not influencers - Track top AI builders, researchers, founders, PMs, and engineers">
  <title>Follow Builders, Not Influencers</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
      background: #000000;
      color: #f5f5f7;
      line-height: 1.5;
      font-size: 17px;
      letter-spacing: -0.022em;
      font-weight: 400;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 22px;
    }

    /* Apple-style navigation */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      z-index: 9999;
    }

    .nav-content {
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      height: 48px;
    }

    .nav-logo {
      font-size: 17px;
      font-weight: 600;
      color: #f5f5f7;
      letter-spacing: -0.022em;
    }

    .lang-switch {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .lang-btn {
      background: transparent;
      border: none;
      color: #86868b;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      padding: 4px 8px;
      transition: color 0.3s;
      font-family: inherit;
    }

    .lang-btn:hover {
      color: #f5f5f7;
    }

    .lang-btn.active {
      color: #f5f5f7;
      font-weight: 600;
    }

    .lang-divider {
      color: #424245;
      font-size: 13px;
    }

    /* Apple-style hero section */
    .hero {
      padding: 60px 0;
      text-align: center;
      margin-top: 48px;
    }

    .hero h1 {
      font-size: 48px;
      line-height: 1.08333;
      font-weight: 600;
      letter-spacing: -0.005em;
      margin-bottom: 6px;
    }

    .hero h1 .gradient {
      background: linear-gradient(90deg, #b2a2ff 0%, #ff6b6b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 24px;
      line-height: 1.16667;
      letter-spacing: 0.004em;
      color: #86868b;
      margin-bottom: 30px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Date selector */
    .date-selector {
      background: #1d1d1f;
      border-radius: 14px;
      padding: 10px 16px;
      margin: 16px auto;
      max-width: 350px;
    }

    .date-selector h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.022em;
      color: #86868b;
    }

    .date-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .date-nav-btn {
      background: transparent;
      border: none;
      color: #2997ff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      padding: 0;
      letter-spacing: -0.022em;
    }

    .date-nav-btn:hover {
      color: #147ce5;
      text-decoration: underline;
    }

    .date-nav-btn:active {
      color: #0a5cb5;
    }

    .date-nav input[type="date"] {
      flex: 1;
      padding: 8px 12px;
      background: #000000;
      border: 1px solid #424245;
      border-radius: 980px;
      color: #f5f5f7;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.3s;
      min-width: 140px;
      text-align: center;
    }

    .date-nav input[type="date"]:focus {
      outline: none;
      border-color: #2997ff;
    }

    .date-nav input[type="date"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
      filter: invert(1);
      opacity: 0.6;
      padding: 4px;
    }

    .date-nav input[type="date"]::-webkit-calendar-picker-indicator:hover {
      opacity: 1;
    }

    .current-date {
      text-align: center;
      margin: 15px 0;
      font-size: 14px;
      color: #86868b;
      letter-spacing: -0.022em;
    }

    .current-date strong {
      color: #f5f5f7;
    }

    /* Content sections */
    .content {
      padding: 60px 0;
    }

    .section {
      margin-bottom: 80px;
    }

    .section-title {
      font-size: 40px;
      line-height: 1.1;
      font-weight: 600;
      letter-spacing: -0.003em;
      margin-bottom: 30px;
    }

    .content-item {
      background: #1d1d1f;
      border-radius: 18px;
      padding: 30px;
      margin-bottom: 20px;
      transition: transform 0.3s;
    }

    .content-item:hover {
      transform: scale(1.01);
    }

    .item-date {
      font-size: 14px;
      color: #86868b;
      margin-bottom: 12px;
      letter-spacing: -0.022em;
    }

    .item-title {
      font-size: 21px;
      line-height: 1.19048;
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: -0.022em;
    }

    .item-content {
      font-size: 17px;
      line-height: 1.52941;
      color: #86868b;
      margin-bottom: 15px;
      letter-spacing: -0.022em;
    }

    .item-link {
      display: inline-block;
      padding: 12px 24px;
      background: #2997ff;
      border: none;
      border-radius: 980px;
      color: #ffffff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s;
      letter-spacing: -0.022em;
    }

    .item-link:hover {
      background: #147ce5;
      transform: scale(1.02);
    }

    /* Footer */
    .footer {
      background: transparent;
      padding: 20px 0;
      text-align: center;
      margin-top: 40px;
    }

    .footer p {
      font-size: 12px;
      color: #86868b;
      margin: 0;
      letter-spacing: -0.022em;
    }

    .footer a {
      color: #2997ff;
      text-decoration: none;
      transition: opacity 0.3s;
    }

    .footer a:hover {
      opacity: 0.7;
    }

    /* Responsive design - Mobile first */
    @media (max-width: 768px) {
      .container {
        padding: 0 16px;
      }

      .lang-switch {
        gap: 4px;
      }

      .lang-btn {
        padding: 3px 6px;
        font-size: 12px;
      }

      .lang-divider {
        font-size: 12px;
      }

      .hero h1 {
        font-size: 40px;
        line-height: 1.1;
      }

      .hero p {
        font-size: 19px;
        line-height: 1.42105;
      }

      .date-selector {
        padding: 8px 12px;
        margin: 12px auto;
        max-width: 100%;
      }

      .date-selector h3 {
        font-size: 12px;
        margin-bottom: 6px;
      }

      .date-nav {
        gap: 6px;
        margin-bottom: 8px;
      }

      .date-nav-btn {
        font-size: 13px;
      }

      .date-nav input[type="date"] {
        padding: 6px 10px;
        font-size: 13px;
        min-width: 120px;
      }

      .current-date {
        margin: 12px 0;
        font-size: 13px;
      }

      .section-title {
        font-size: 32px;
        line-height: 1.125;
      }

      .content {
        padding: 24px 0;
      }

      .content-item {
        padding: 16px;
        margin-bottom: 12px;
        border-radius: 12px;
      }

      .item-title {
        font-size: 19px;
        line-height: 1.26316;
      }

      .item-content {
        font-size: 16px;
        line-height: 1.625;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 0 12px;
      }

      .nav-logo {
        font-size: 15px;
      }

      .lang-switch {
        gap: 3px;
      }

      .lang-btn {
        padding: 2px 5px;
        font-size: 11px;
      }

      .lang-divider {
        font-size: 11px;
      }

      .hero h1 {
        font-size: 32px;
        line-height: 1.125;
      }

      .hero p {
        font-size: 17px;
        line-height: 1.58824;
      }

      .date-selector {
        padding: 6px 10px;
        margin: 10px auto;
      }

      .date-selector h3 {
        font-size: 11px;
        margin-bottom: 4px;
      }

      .date-nav {
        gap: 4px;
        margin-bottom: 6px;
      }

      .date-nav-btn {
        font-size: 12px;
      }

      .date-nav input[type="date"] {
        padding: 5px 8px;
        font-size: 12px;
        min-width: 100px;
      }

      .current-date {
        margin: 10px 0;
        font-size: 12px;
      }

      .section-title {
        font-size: 28px;
        line-height: 1.28571;
      }
    }

    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      body {
        background: #000000;
        color: #f5f5f7;
      }
    }

    /* Print styles */
    @media print {
      .nav,
      .date-selector {
        display: none;
      }

      .hero {
        padding: 40px 0;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-content">
      <div class="nav-logo" data-i18n="logo">Follow Builders</div>
      <div class="lang-switch">
        <button class="lang-btn active" data-lang="en" onclick="switchLanguage('en')">EN</button>
        <span class="lang-divider">|</span>
        <button class="lang-btn" data-lang="zh" onclick="switchLanguage('zh')">中文</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <!-- Hero Section -->
    <section class="hero">
      <h1 data-i18n="hero-title">Follow <span class="gradient">Builders</span><br>Not Influencers</h1>
      <p data-i18n="hero-desc">Track top AI builders, researchers, founders, PMs, and engineers who are actually building products.</p>
    </section>

    <!-- Date Selector -->
    <div class="date-selector">
      <h3 data-i18n="select-date">Select Date</h3>
      <div class="date-nav">
        <button class="date-nav-btn" onclick="navigateDate(-1)" data-i18n="previous-day">Previous</button>
        <input type="date" id="customDateInput">
        <button class="date-nav-btn" onclick="navigateDate(1)" data-i18n="next-day">Next</button>
      </div>
      <div class="current-date">
        <span data-i18n="viewing">Viewing:</span> <strong id="currentDateDisplay">Today</strong>
      </div>
    </div>

    <!-- Content -->
    <div id="content" class="content">
      <section class="section" id="podcasts">
        <h2 class="section-title" data-i18n="podcasts-title">Podcasts</h2>
        <div id="podcasts-content"></div>
      </section>

      <section class="section" id="tweets">
        <h2 class="section-title" data-i18n="tweets-title">Twitter Updates</h2>
        <div id="tweets-content"></div>
      </section>

      <section class="section" id="blogs">
        <h2 class="section-title" data-i18n="blogs-title">Engineering Blogs</h2>
        <div id="blogs-content"></div>
      </section>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>Source: <a href="https://github.com/zarazhangrui/follow-builders" target="_blank">follow-builders project</a></p>
    </footer>
  </div>

  <script>
    // Default data (fallback in case JSON files don't exist)
    const defaultData = {
      podcasts: [
        {
          name: "AI Podcast Episode 1",
          description: "Discussion about latest AI trends and developments in industry.",
          url: "https://example.com/podcast1"
        },
        {
          name: "AI Podcast Episode 2",
          description: "Deep dive into machine learning and neural networks.",
          url: "https://example.com/podcast2"
        },
        {
          name: "AI Podcast Episode 3",
          description: "Interview with AI researchers about future of AI.",
          url: "https://example.com/podcast3"
        }
      ],
      tweets: [
        {
          name: "AI Expert",
          handle: "@aiexpert",
          text: "Just shipped a new AI feature that improves accuracy by 30%. #AI #MachineLearning",
          url: "https://twitter.com/aiexpert/status/1"
        },
        {
          name: "ML Researcher",
          handle: "@mlresearcher",
          text: "New paper on transformer models is now available on arXiv.",
          url: "https://twitter.com/mlresearcher/status/2"
        },
        {
          name: "Data Scientist",
          handle: "@datascientist",
          text: "Working on optimizing data pipelines for better performance.",
          url: "https://twitter.com/datascientist/status/3"
        },
        {
          name: "AI Engineer",
          handle: "@aiengineer",
          text: "Excited to share our latest AI model benchmarks!",
          url: "https://twitter.com/aiengineer/status/4"
        },
        {
          name: "Tech Founder",
          handle: "@techfounder",
          text: "Building next generation of AI-powered tools.",
          url: "https://twitter.com/techfounder/status/5"
        }
      ],
      blogs: [
        {
          title: "The Future of AI in 2024",
          description: "Comprehensive analysis of AI trends and predictions for coming year.",
          url: "https://example.com/blog1"
        },
        {
          title: "Building Scalable AI Systems",
          description: "Best practices for deploying AI models at scale in production.",
          url: "https://example.com/blog2"
        },
        {
          title: "Understanding Neural Networks",
          description: "A beginner-friendly guide to understanding how neural networks work.",
          url: "https://example.com/blog3"
        }
      ]
    };

    // GitHub data source URLs
    const PODCASTS_URL = './feed-podcasts.json';
    const TWEETS_URL = './feed-x.json';
    const BLOGS_URL = './feed-blogs.json';

    let currentOffset = 0;
    let selectedDate = null;

    // Language translations
    const translations = {
      en: {
        'logo': 'Follow Builders',
        'hero-title': 'Follow <span class="gradient">Builders</span><br>Not Influencers',
        'hero-desc': 'Track top AI builders, researchers, founders, PMs, and engineers who are actually building products.',
        'select-date': 'Select Date',
        'previous-day': 'Previous',
        'next-day': 'Next',
        'viewing': 'Viewing:',
        'podcasts-title': 'Podcasts',
        'tweets-title': 'Twitter Updates',
        'blogs-title': 'Engineering Blogs',
        'listen-now': 'Listen Now',
        'view-tweet': 'View Tweet',
        'read-more': 'Read More'
      },
      zh: {
        'logo': '关注构建者',
        'hero-title': '关注<span class="gradient">构建者</span><br>而非影响者',
        'hero-desc': '追踪真正在构建产品的顶级AI构建者、研究员、创始人、产品经理和工程师。',
        'select-date': '选择日期',
        'previous-day': '前一天',
        'next-day': '后一天',
        'viewing': '查看：',
        'podcasts-title': '播客',
        'tweets-title': 'Twitter更新',
        'blogs-title': '工程博客',
        'listen-now': '立即收听',
        'view-tweet': '查看推文',
        'read-more': '阅读更多'
      }
    };

    let currentLanguage = localStorage.getItem('language') || 'en';

    // Switch language function
    function switchLanguage(lang) {
      currentLanguage = lang;
      localStorage.setItem('language', lang);

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.lang === lang) {
          btn.classList.add('active');
        }
      });

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang][key]) {
          el.innerHTML = translations[lang][key];
        }
      });

      if (selectedDate) {
        updateDateDisplayForCustomDate(selectedDate);
      } else {
        updateDateDisplay(currentOffset);
      }

      // 修复：使用 selectedDate 而不是 currentDate
      if (selectedDate) {
        renderContent(selectedDate);
      }
    }

    // Navigate date function
    function navigateDate(days) {
      const dateInput = document.getElementById('customDateInput');
      let date;

      if (dateInput.value) {
        date = new Date(dateInput.value);
      } else {
        date = new Date();
      }

      date.setDate(date.getDate() + days);
      selectedDate = date;

      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const formattedDate = `${year}-${month}-${day}`;

      dateInput.value = formattedDate;
      updateDateDisplayForCustomDate(date);
      renderContent(date);
    }

    // Load data from JSON files with fallback
    async function loadData() {
      try {
        const [podcasts, tweets, blogs] = await Promise.all([
          fetch(PODCASTS_URL).then(res => {
            if (!res.ok) throw new Error('Podcasts file not found');
            return res.json();
          }),
          fetch(TWEETS_URL).then(res => {
            if (!res.ok) throw new Error('Tweets file not found');
            return res.json();
          }),
          fetch(BLOGS_URL).then(res => {
            if (!res.ok) throw new Error('Blogs file not found');
            return res.json();
          })
        ]);

        return { podcasts, tweets, blogs };
      } catch (error) {
        console.log('Using default data:', error);
        return defaultData;
      }
    }

    // Update date display
    function updateDateDisplay(offset) {
      const display = document.getElementById('currentDateDisplay');
      const date = new Date();
      date.setDate(date.getDate() + offset);

      const options = {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'long'
      };

      display.textContent = date.toLocaleDateString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US', options);
    }

    function updateDateDisplayForCustomDate(date) {
      const display = document.getElementById('currentDateDisplay');

      const options = {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'long'
      };

      display.textContent = date.toLocaleDateString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US', options);
    }

    // Render content
    async function renderContent(date) {
      const data = await loadData();

      // 确保数据是数组
      const podcasts = Array.isArray(data.podcasts) ? data.podcasts : defaultData.podcasts;
      const tweets = Array.isArray(data.tweets) ? data.tweets : defaultData.tweets;
      const blogs = Array.isArray(data.blogs) ? data.blogs : defaultData.blogs;

      renderPodcasts(podcasts, date);
      renderTweets(tweets, date);
      renderBlogs(blogs, date);
    }

    function renderPodcasts(podcasts, date) {
      const container = document.getElementById('podcasts-content');
      if (!Array.isArray(podcasts)) {
        container.innerHTML = '<div class="content-item"><p>No podcasts available</p></div>';
        return;
      }
      container.innerHTML = podcasts.map(podcast => `
        <div class="content-item">
          <div class="item-date">${date.toLocaleDateString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</div>
          <div class="item-title">${podcast.name || podcast.title || 'Untitled'}</div>
          <div class="item-content">${podcast.description || podcast.summary || 'No description available'}</div>
          ${podcast.url ? `<a href="${podcast.url}" target="_blank" class="item-link">${translations[currentLanguage]['listen-now']}</a>` : ''}
        </div>
      `).join('');
    }

    function renderTweets(tweets, date) {
      const container = document.getElementById('tweets-content');
      if (!Array.isArray(tweets)) {
        container.innerHTML = '<div class="content-item"><p>No tweets available</p></div>';
        return;
      }
      container.innerHTML = tweets.map(tweet => `
        <div class="content-item">
          <div class="item-date">${date.toLocaleDateString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</div>
          <div class="item-title">${tweet.name || tweet.handle || 'Unknown User'}</div>
          <div class="item-content">${tweet.text || tweet.content || 'No content available'}</div>
          ${tweet.url ? `<a href="${tweet.url}" target="_blank" class="item-link">${translations[currentLanguage]['view-tweet']}</a>` : ''}
        </div>
      `).join('');
    }

    function renderBlogs(blogs, date) {
      const container = document.getElementById('blogs-content');
      if (!Array.isArray(blogs)) {
        container.innerHTML = '<div class="content-item"><p>No blogs available</p></div>';
        return;
      }
      container.innerHTML = blogs.map(blog => `
        <div class="content-item">
          <div class="item-date">${date.toLocaleDateString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</div>
          <div class="item-title">${blog.title || blog.name || 'Untitled'}</div>
          <div class="item-content">${blog.description || blog.summary || 'No description available'}</div>
          ${blog.url ? `<a href="${blog.url}" target="_blank" class="item-link">${translations[currentLanguage]['read-more']}</a>` : ''}
        </div>
      `).join('');
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      switchLanguage(currentLanguage);

      const dateInput = document.getElementById('customDateInput');
      const today = new Date();
      selectedDate = today;

      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, '0');
      const day = String(today.getDate()).padStart(2, '0');
      dateInput.value = `${year}-${month}-${day}`;

      updateDateDisplayForCustomDate(today);
      await renderContent(today);

      dateInput.addEventListener('change', async () => {
        if (dateInput.value) {
          selectedDate = new Date(dateInput.value);
          updateDateDisplayForCustomDate(selectedDate);
          await renderContent(selectedDate);
        }
      });
    });
  </script>
</body>
</html>
