<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Follow Builders - Twitter Updates</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; background: #000; color: #f5f5f7; line-height: 1.6; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    .header { text-align: center; padding: 40px 0; }
    .header h1 { font-size: 32px; font-weight: 600; margin-bottom: 10px; }
    .header h1 span { background: linear-gradient(90deg, #b2a2ff, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header p { color: #86868b; font-size: 16px; }
    .date-nav { background: #1d1d1f; border-radius: 12px; padding: 16px; margin: 20px 0; text-align: center; }
    .date-nav h3 { font-size: 14px; color: #86868b; margin-bottom: 12px; }
    .date-nav input[type="date"] { padding: 10px 16px; background: #000; border: 1px solid #424245; border-radius: 8px; color: #f5f5f7; font-size: 14px; }
    .date-nav input[type="date"]:focus { outline: none; border-color: #2997ff; }
    .loading { text-align: center; padding: 60px; color: #86868b; }
    .loading-icon { font-size: 40px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .content { display: none; }
    .tweet { background: #1d1d1f; border-radius: 16px; padding: 24px; margin-bottom: 16px; }
    .tweet:hover { transform: scale(1.01); transition: transform 0.3s; }
    .tweet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .tweet-user { font-weight: 600; font-size: 16px; }
    .tweet-handle { color: #86868b; font-size: 14px; margin-left: 8px; }
    .tweet-date { color: #86868b; font-size: 13px; }
    .tweet-text { font-size: 15px; line-height: 1.6; color: #d1d1d3; margin-bottom: 16px; white-space: pre-wrap; }
    .tweet-link { display: inline-block; padding: 8px 16px; background: #2997ff; border-radius: 20px; color: #fff; text-decoration: none; font-size: 14px; font-weight: 500; }
    .tweet-link:hover { background: #147ce5; }
    .no-data { text-align: center; padding: 60px; color: #86868b; font-size: 16px; }
    .footer { text-align: center; padding: 40px 0; color: #86868b; font-size: 12px; }
    .footer a { color: #2997ff; text-decoration: none; }
    @media (max-width: 600px) {
      .container { padding: 12px; }
      .header h1 { font-size: 24px; }
      .tweet { padding: 16px; }
      .tweet-text { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Follow <span>Builders</span> Twitter</h1>
      <p>Track top AI builders on X/Twitter</p>
    </div>
    
    <div class="date-nav">
      <h3>Select Date</h3>
      <input type="date" id="dateInput">
    </div>
    
    <div id="loading" class="loading">
      <div class="loading-icon">⏳</div>
      <p>Loading tweets...</p>
    </div>
    
    <div id="content" class="content">
      <div id="tweets"></div>
    </div>
    
    <div class="footer">
      <p>Source: <a href="https://github.com/YOUTHPLUS/follow-builders" target="_blank">YOUTHPLUS/follow-builders</a></p>
    </div>
  </div>

  <script>
    const TWEETS_URL = 'https://raw.githubusercontent.com/YOUTHPLUS/follow-builders/main/feed-x.json';
    
    let allTweetsData = [];
    let currentDate = null;
    
    function isSameDate(d1, d2) {
      return d1.getFullYear() === d2.getFullYear() &&
             d1.getMonth() === d2.getMonth() &&
             d1.getDate() === d2.getDate();
    }
    
    async function loadTweets(targetDate) {
      currentDate = targetDate;
      const loading = document.getElementById('loading');
      const content = document.getElementById('content');
      const tweetsContainer = document.getElementById('tweets');
      
      loading.style.display = 'block';
      content.style.display = 'none';
      
      try {
        if (allTweetsData.length === 0) {
          const response = await fetch(TWEETS_URL);
          const data = await response.json();
          allTweetsData = data.x || [];
        }
        
        let flatTweets = [];
        allTweetsData.forEach(user => {
          if (user.tweets) {
            user.tweets.forEach(tweet => {
              flatTweets.push({
                ...tweet,
                userName: user.name,
                userHandle: user.handle
              });
            });
          }
        });
        
        const filteredTweets = flatTweets.filter(tweet => {
          const tweetDate = new Date(tweet.createdAt);
          return isSameDate(tweetDate, targetDate);
        });
        
        if (filteredTweets.length === 0) {
          tweetsContainer.innerHTML = '<div class="no-data">No tweets found for this date.</div>';
        } else {
          tweetsContainer.innerHTML = filteredTweets.map(tweet => `
            <div class="tweet">
              <div class="tweet-header">
                <div>
                  <span class="tweet-user">${tweet.userName}</span>
                  <span class="tweet-handle">@${tweet.userHandle}</span>
                </div>
                <span class="tweet-date">${new Date(tweet.createdAt).toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'})}</span>
              </div>
              <div class="tweet-text">${tweet.text}</div>
              ${tweet.url ? `<a href="${tweet.url}" target="_blank" class="tweet-link">View Tweet →</a>` : ''}
            </div>
          `).join('');
        }
        
        loading.style.display = 'none';
        content.style.display = 'block';
        
      } catch (error) {
        console.error('Error loading tweets:', error);
        tweetsContainer.innerHTML = '<div class="no-data">Failed to load tweets. Please try again.</div>';
        loading.style.display = 'none';
        content.style.display = 'block';
      }
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      const dateInput = document.getElementById('dateInput');
      const today = new Date();
      
      dateInput.value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
      loadTweets(today);
      
      dateInput.addEventListener('change', (e) => {
        const selectedDate = new Date(e.target.value);
        loadTweets(selectedDate);
      });
    });
  </script>
</body>
</html>
