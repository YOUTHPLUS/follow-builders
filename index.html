      max-width: 700px;
      width: 100%;
      position: relative;
      margin-top: 48px;

      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

      position: absolute;
      top: 20px;
      right: 20px;
      background: transparent;
      border: none;
      color: #86868b;
      font-size: 32px;
      cursor: pointer;
      padding: 8px;

    let currentLanguage = localStorage.getItem('language') || 'en';

    // Switch language function
    function switchLanguage(lang) {
      currentLanguage = lang;
      localStorage.setItem('language', lang);

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.lang === lang) {
          btn.classList.add('active');
        }
      });

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang][key]) {
          el.innerHTML = translations[lang][key];
        }
      });

      if (selectedDate) {
        updateDateDisplayForCustomDate(selectedDate);
      } else {
        updateDateDisplay(currentOffset);
      }

      if (selectedDate) {
        renderContent(selectedDate);
      }
    }

    // Navigate date function
    function navigateDate(days) {
      const dateInput = document.getElementById('customDateInput');
      let date;

      if (dateInput.value) {
        date = new Date(dateInput.value);
      } else {
        date = new Date();
      }

      date.setDate(date.getDate() + days);
      selectedDate = date;

      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const formattedDate = `${year}-${month}-${day}`;

      dateInput.value = formattedDate;
      updateDateDisplayForCustomDate(date);
      renderContent(date);
    }

    // Load data from JSON files with fallback
    async function loadData() {
      try {
        const [tweets, blogs] = await Promise.all([
          fetch(TWEETS_URL).then(res => {
            if (!res.ok) throw new Error('Tweets file not found');
            return res.json();
          }),
          fetch(BLOGS_URL).then(res => {
            if (!res.ok) throw new Error('Blogs file not found');
            return res.json();
          })
        ]);

        return { tweets, blogs };
      } catch (error) {
        console.log('Using default data:', error);
        return defaultData;
      }
    }

    // Update date display
    function updateDateDisplay(offset) {
      const display = document.getElementById('currentDateDisplay');
      const date = new Date();
      date.setDate(date.getDate() + offset);

      const options = {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'long'
      };

      display.textContent = date.toLocaleDateString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US', options);
    }

    function updateDateDisplayForCustomDate(date) {
      const display = document.getElementById('currentDateDisplay');

      const options = {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'long'
      };

      display.textContent = date.toLocaleDateString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US', options);
    }

    // Render content
    async function renderContent(date) {
      const data = await loadData();

      // 确保数据是数组
      const tweets = Array.isArray(data.tweets) ? data.tweets : defaultData.tweets;
      const blogs = Array.isArray(data.blogs) ? data.blogs : defaultData.blogs;

      renderTweets(tweets, date);
      renderBlogs(blogs, date);
    }

    function renderTweets(tweets, date) {
      const container = document.getElementById('tweets-content');
      if (!Array.isArray(tweets)) {
        container.innerHTML = '<div class="content-item"><p>No tweets available</p></div>';
        return;
      }
      container.innerHTML = tweets.map((tweet, index) => `
        <div class="content-item">
          <div class="item-date">${date.toLocaleDateString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</div>
          <div class="item-title">${tweet.name || tweet.handle || 'Unknown User'}</div>
          <div class="item-content">${tweet.text || tweet.content || 'No content available'}</div>
          <button class="item-link" onclick="openModal('tweet', ${index})">${translations[currentLanguage]['view-tweet']}</button>
        </div>
      `).join('');
    }

    function renderBlogs(blogs, date) {
      const container = document.getElementById('blogs-content');
      if (!Array.isArray(blogs)) {
        container.innerHTML = '<div class="content-item"><p>No blogs available</p></div>';
        return;
      }
      container.innerHTML = blogs.map((blog, index) => `
        <div class="content-item">
          <div class="item-date">${date.toLocaleDateString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</div>
          <div class="item-title">${blog.title || blog.name || 'Untitled'}</div>
          <div class="item-content">${blog.description || blog.summary || 'No description available'}</div>
          <button class="item-link" onclick="openModal('blog', ${index})">${translations[currentLanguage]['read-more']}</button>
        </div>
      `).join('');
    }

    // Modal functions
    let currentData = null;

    function openModal(type, index) {
      const data = currentData || defaultData;
      const items = type === 'tweet' ? data.tweets : data.blogs;
      const item = items[index];

      if (!item) return;

      const modal = document.getElementById('modal');
      const modalTitle = document.getElementById('modal-title');
      const modalMeta = document.getElementById('modal-meta');
      const modalBody = document.getElementById('modal-body');
      const modalFooter = document.getElementById('modal-footer');

      if (type === 'tweet') {
        modalTitle.textContent = item.name || item.handle;
        modalMeta.textContent = `@${item.handle} • ${item.date || new Date().toLocaleDateString()}`;
        modalBody.textContent = item.text || item.content || 'No content available';
        modalFooter.innerHTML = `<a href="${item.url}" target="_blank" class="modal-link">${translations[currentLanguage]['view-full']}</a>`;
      } else {
        modalTitle.textContent = item.title || item.name;
        const authorText = item.author ? `By ${item.author}` : '';
        const publishedText = item.published ? ` • ${item.published}` : '';
        modalMeta.textContent = `${authorText}${publishedText}`;
        modalBody.textContent = item.content || item.description || 'No content available';
        modalFooter.innerHTML = `<a href="${item.url}" target="_blank" class="modal-link">${translations[currentLanguage]['view-original']}</a>`;
      }

      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.remove('active');
      document.body.style.overflow = '';
    }

    // Close modal on outside click
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });

    // Close modal on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeModal();
      }
    });

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      switchLanguage(currentLanguage);

      const dateInput = document.getElementById('customDateInput');
      const today = new Date();
      selectedDate = today;

      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, '0');
      const day = String(today.getDate()).padStart(2, '0');
      dateInput.value = `${year}-${month}-${day}`;

      updateDateDisplayForCustomDate(today);

      // Load and save data for modal
      currentData = await loadData();

      await renderContent(today);

      dateInput.addEventListener('change', async () => {
        if (dateInput.value) {
          selectedDate = new Date(dateInput.value);
          updateDateDisplayForCustomDate(selectedDate);
          currentData = await loadData();
          await renderContent(selectedDate);
        }
      });
    });
  </script>
</body>
</html>
