<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Follow builders, not influencers - Track top AI builders, researchers, founders, PMs, and engineers">
  <title>Follow Builders, Not Influencers</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
      background: #000000;
      color: #f5f5f7;
      line-height: 1.5;
      font-size: 17px;
      letter-spacing: -0.022em;
      font-weight: 400;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 22px;
    }
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      z-index: 9999;
    }
    .nav-content {
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      height: 48px;
    }
    .nav-logo {
      font-size: 17px;
      font-weight: 600;
      color: #f5f5f7;
      letter-spacing: -0.022em;
    }
    .lang-switch {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .lang-btn {
      background: transparent;
      border: none;
      color: #86868b;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      padding: 4px 8px;
      transition: color 0.3s;
      font-family: inherit;
    }
    .lang-btn:hover {
      color: #f5f5f7;
    }
    .lang-btn.active {
      color: #f5f5f7;
      font-weight: 600;
    }
    .lang-divider {
      color: #424245;
      font-size: 13px;
    }
    .hero {
      padding: 60px 0;
      text-align: center;
      margin-top: 48px;
    }
    .hero h1 {
      font-size: 48px;
      line-height: 1.08333;
      font-weight: 600;
      letter-spacing: -0.005em;
      margin-bottom: 6px;
    }
    .hero h1 .gradient {
      background: linear-gradient(90deg, #b2a2ff 0%, #ff6b6b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 24px;
      line-height: 1.16667;
      letter-spacing: 0.004em;
      color: #86868b;
      margin-bottom: 30px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }
    .date-selector {
      background: #1d1d1f;
      border-radius: 14px;
      padding: 10px 16px;
      margin: 16px auto;
      max-width: 350px;
    }
    .date-selector h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.022em;
      color: #86868b;
    }
    .date-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .date-nav-btn {
      background: transparent;
      border: none;
      color: #2997ff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      padding: 0;
      letter-spacing: -0.022em;
    }
    .date-nav-btn:hover {
      color: #147ce5;
      text-decoration: underline;
    }
    .date-nav input[type="date"] {
      flex: 1;
      padding: 8px 12px;
      background: #000000;
      border: 1px solid #424245;
      border-radius: 980px;
      color: #f5f5f7;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.3s;
      min-width: 140px;
      text-align: center;
    }
    .date-nav input[type="date"]:focus {
      outline: none;
      border-color: #2997ff;
    }
    .date-nav input[type="date"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
      filter: invert(1);
      opacity: 0.6;
      padding: 4px;
    }
    .current-date {
      text-align: center;
      margin: 15px 0;
      font-size: 14px;
      color: #86868b;
      letter-spacing: -0.022em;
    }
    .current-date strong {
      color: #f5f5f7;
    }
    .content {
      padding: 60px 0;
    }
    .section {
      margin-bottom: 80px;
    }
    .section-title {
      font-size: 40px;
      line-height: 1.1;
      font-weight: 600;
      letter-spacing: -0.003em;
      margin-bottom: 30px;
    }
    .content-item {
      background: #1d1d1f;
      border-radius: 18px;
      padding: 30px;
      margin-bottom: 20px;
      transition: transform 0.3s;
    }
    .content-item:hover {
      transform: scale(1.01);
    }
    .item-date {
      font-size: 14px;
      color: #86868b;
      margin-bottom: 12px;
      letter-spacing: -0.022em;
    }
    .item-title {
      font-size: 21px;
      line-height: 1.19048;
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: -0.022em;
    }
    .item-content {
      font-size: 17px;
      line-height: 1.52941;
      color: #86868b;
      margin-bottom: 15px;
      letter-spacing: -0.022em;
    }
    .item-link {
      display: inline-block;
      padding: 12px 24px;
      background: #2997ff;
      border: none;
      border-radius: 980px;
      color: #ffffff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s;
      letter-spacing: -0.022em;
    }
    .item-link:hover {
      background: #147ce5;
      transform: scale(1.02);
    }
    .loading {
      text-align: center;
      padding: 100px 0;
      font-size: 17px;
      color: #86868b;
    }
    .loading-icon {
      font-size: 48px;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .footer {
      background: transparent;
      padding: 20px 0;
      text-align: center;
      margin-top: 40px;
    }
    .footer p {
      font-size: 12px;
      color: #86868b;
      margin: 0;
      letter-spacing: -0.022em;
    }
    .footer a {
      color: #2997ff;
      text-decoration: none;
      transition: opacity 0.3s;
    }
    .footer a:hover {
      opacity: 0.7;
    }
    @media (max-width: 768px) {
      .container { padding: 0 16px; }
      .hero h1 { font-size: 40px; }
      .hero p { font-size: 19px; }
      .section-title { font-size: 32px; }
      .content { padding: 24px 0; }
      .content-item { padding: 16px; margin-bottom: 12px; border-radius: 12px; }
    }
    @media (max-width: 480px) {
      .container { padding: 0 12px; }
      .hero h1 { font-size: 32px; }
      .hero p { font-size: 17px; }
      .section-title { font-size: 28px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-content">
      <div class="nav-logo" data-i18n="logo">Follow Builders</div>
      <div class="lang-switch">
        <button class="lang-btn active" data-lang="en" onclick="switchLanguage('en')">EN</button>
        <span class="lang-divider">|</span>
        <button class="lang-btn" data-lang="zh" onclick="switchLanguage('zh')">中文</button>
      </div>
    </div>
  </nav>
  <div class="container">
    <section class="hero">
      <h1 data-i18n="hero-title">Follow <span class="gradient">Builders</span><br>Not Influencers</h1>
      <p data-i18n="hero-desc">Track top AI builders, researchers, founders, PMs, and engineers who are actually building products.</p>
    </section>
    <div class="date-selector">
      <h3 data-i18n="select-date">Select Date</h3>
      <div class="date-nav">
        <button class="date-nav-btn" onclick="navigateDate(-1)" data-i18n="previous-day">Previous</button>
        <input type="date" id="customDateInput">
        <button class="date-nav-btn" onclick="navigateDate(1)" data-i18n="next-day">Next</button>
      </div>
      <div class="current-date">
        <span data-i18n="viewing">Viewing:</span> <strong id="currentDateDisplay">Today</strong>
      </div>
    </div>
    <div id="loading" class="loading">
      <div class="loading-icon">⏳</div>
      <p data-i18n="loading">Loading data...</p>
    </div>
    <div id="content" class="content" style="display: none;">
      <section class="section" id="tweets">
        <h2 class="section-title" data-i18n="tweets-title">Twitter Updates</h2>
        <div id="tweets-content"></div>
      </section>
    </div>
    <footer class="footer">
      <p>Source: <a href="https://github.com/YOUTHPLUS/follow-builders" target="_blank">follow-builders project</a></p>
    </footer>
  </div>
  <script>
    // ✅ 修改为你的 fork 仓库地址
    const TWEETS_URL = 'https://raw.githubusercontent.com/YOUTHPLUS/follow-builders/main/feed-x.json';
    
    let currentOffset = 0;
    let selectedDate = null;
    
    const translations = {
      en: {
        'logo': 'Follow Builders',
        'hero-title': 'Follow <span class="gradient">Builders</span><br>Not Influencers',
        'hero-desc': 'Track top AI builders, researchers, founders, PMs, and engineers who are actually building products.',
        'select-date': 'Select Date',
        'previous-day': 'Previous',
        'next-day': 'Next',
        'viewing': 'Viewing:',
        'loading': 'Loading data...',
        'tweets-title': 'Twitter Updates',
        'view-tweet': 'View Tweet',
        'no-data': 'No data available for this date.',
        'no-data-custom': 'No data available for {date}.',
        'failed-load': 'Failed to load data. Please try again.',
        'select-date-alert': 'Please select a date'
      },
      zh: {
        'logo': '关注构建者',
        'hero-title': '关注<span class="gradient">构建者</span><br>而非影响者',
        'hero-desc': '追踪真正在构建产品的顶级AI构建者、研究员、创始人、产品经理和工程师。',
        'select-date': '选择日期',
        'previous-day': '前一天',
        'next-day': '后一天',
        'viewing': '查看：',
        'loading': '加载数据中...',
        'tweets-title': 'Twitter更新',
        'view-tweet': '查看推文',
        'no-data': '此日期没有可用数据。',
        'no-data-custom': '{date}没有可用数据。',
        'failed-load': '加载数据失败，请重试。',
        'select-date-alert': '请选择日期'
      }
    };
    
    let currentLanguage = localStorage.getItem('language') || 'en';
    let allTweets = [];
    let filteredDataCache = null;
    
    function switchLanguage(lang) {
      currentLanguage = lang;
      localStorage.setItem('language', lang);
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.lang === lang) btn.classList.add('active');
      });
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang][key]) el.innerHTML = translations[lang][key];
      });
      if (selectedDate) updateDateDisplayForCustomDate(selectedDate);
      else updateDateDisplay(currentOffset);
      const content = document.getElementById('content');
      if (content.style.display !== 'none' && filteredDataCache) renderContent(filteredDataCache);
    }
    
    function navigateDate(days) {
      const dateInput = document.getElementById('customDateInput');
      let date = dateInput.value ? new Date(dateInput.value) : new Date();
      date.setDate(date.getDate() + days);
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      dateInput.value = `${year}-${month}-${day}`;
      loadDataByCustomDate();
    }
    
    function isSameDate(date1, date2) {
      const d1 = new Date(date1);
      const d2 = new Date(date2);
      return d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth() && d1.getDate() === d2.getDate();
    }
    
    async function loadDataByOffset(offset) {
      currentOffset = offset;
      const loading = document.getElementById('loading');
      const content = document.getElementById('content');
      loading.style.display = 'block';
      content.style.display = 'none';
      const today = new Date();
      const targetDate = new Date(today);
      targetDate.setDate(today.getDate() + offset);
      updateDateDisplay(offset);
      try {
        if (allTweets.length === 0) {
          [allTweets] = await Promise.all([fetch(TWEETS_URL).then(res => res.json())]);
        }
        const filteredData = filterDataByDate(targetDate);
        filteredDataCache = filteredData;
        if (filteredData.isEmpty) showNoDataMessage(targetDate);
        else renderContent(filteredData);
        loading.style.display = 'none';
        content.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (error) {
        loading.innerHTML = `<div class="loading-icon">❌</div><p>${translations[currentLanguage]['failed-load']}</p>`;
      }
    }
    
    async function loadDataByCustomDate() {
      const dateInput = document.getElementById('customDateInput');
      if (!dateInput.value) {
        alert(translations[currentLanguage]['select-date-alert']);
        return;
      }
      selectedDate = new Date(dateInput.value);
      const loading = document.getElementById('loading');
      const content = document.getElementById('content');
      loading.style.display = 'block';
      content.style.display = 'none';
      updateDateDisplayForCustomDate(selectedDate);
      try {
        if (allTweets.length === 0) {
          [allTweets] = await Promise.all([fetch(TWEETS_URL).then(res => res.json())]);
        }
        const filteredData = filterDataByDate(selectedDate);
        filteredDataCache = filteredData;
        if (filteredData.isEmpty) showNoDataForCustomDate(selectedDate);
        else renderContent(filteredData);
        loading.style.display = 'none';
        content.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (error) {
        loading.innerHTML = `<div class="loading-icon">❌</div><p>${translations[currentLanguage]['failed-load']}</p>`;
      }
    }
    
    function filterDataByDate(targetDate) {
      let allTweetsFlat = [];
      allTweets.forEach(user => {
        if (user.tweets) {
          user.tweets.forEach(tweet => {
            allTweetsFlat.push({ ...tweet, userName: user.name, userHandle: user.handle });
          });
        }
      });
      const filteredTweets = allTweetsFlat.filter(tweet => {
        const tweetDate = new Date(tweet.createdAt);
        return isSameDate(tweetDate, targetDate);
      });
      return { podcasts: [], tweets: filteredTweets, blogs: [], isEmpty: filteredTweets.length === 0, date: targetDate };
    }
    
    function updateDateDisplay(offset) {
      const display = document.getElementById('currentDateDisplay');
      const date = new Date();
      date.setDate(date.getDate() + offset);
      display.textContent = date.toLocaleDateString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    }
    
    function updateDateDisplayForCustomDate(date) {
      const display = document.getElementById('currentDateDisplay');
      display.textContent = date.toLocaleDateString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    }
    
    function renderContent(data) { renderTweets(data.tweets, data.date); }
    
    function showNoDataMessage(date) {
      const container = document.getElementById('tweets-content');
      const dateStr = date.toLocaleDateString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
      container.innerHTML = `<div style="text-align: center; padding: 40px; color: #86868b; font-size: 17px;">${translations[currentLanguage]['no-data-custom'].replace('{date}', dateStr)}</div>`;
    }
    
    function showNoDataForCustomDate(date) { showNoDataMessage(date); }
    
    function renderTweets(tweets, date) {
      const container = document.getElementById('tweets-content');
      if (tweets.length === 0) {
        container.innerHTML = `<div style="text-align: center; padding: 40px; color: #86868b; font-size: 17px;">${translations[currentLanguage]['no-data']}</div>`;
        return;
      }
      container.innerHTML = tweets.map(tweet => `
        <div class="content-item">
          <div class="item-date">${date.toLocaleDateString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</div>
          <div class="item-title">@${tweet.userHandle || 'Unknown'}</div>
          <div class="item-content">${tweet.text || 'No content available'}</div>
          ${tweet.url ? `<a href="${tweet.url}" target="_blank" class="item-link">${translations[currentLanguage]['view-tweet']}</a>` : ''}
        </div>
      `).join('');
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      switchLanguage(currentLanguage);
      const dateInput = document.getElementById('customDateInput');
      const today = new Date();
      dateInput.value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
      dateInput.addEventListener('change', () => { if (dateInput.value) loadDataByCustomDate(); });
      loadDataByOffset(0);
    });
    
    setInterval(() => { loadDataByOffset(currentOffset); }, 30 * 60 * 1000);
  </script>
</body>
</html>
